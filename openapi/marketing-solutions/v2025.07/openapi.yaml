                              pointsOfInterest:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    latitude:
                                      type: number
                                      description: ISO-6709 latitude (rounded at 5 decimals)
                                      format: double
                                      nullable: true
                                    longitude:
                                      type: number
                                      description: ISO-6709 longitude (rounded at 5 decimals)
                                      format: double
                                      nullable: true
                                    name:
