      summary: Get Seller Budgets
      description: "Return a collection of budgets filtered by optional filter parameters.\r\nIf all parameters are omitted the entire collection to which the user has\r\naccess is returned, except those whose endDate is in the past. Returned budgets must satisfy all supplied filter\r\ncriteria if multiple parameters are used.\r\n            \r\n<b>Date filter.</b> Filtering can return only budgets that were active for a\r\ndate range by specifying the startBeforeDate and endAfterDate. Leaving off the startBeforeDate\r\nvalue makes budgets with any startDate qualify, whereas when leaving off the endAfterDate value will only return\r\nbudgets whose endDate has not already passed. To get budgets that were active\r\non a specific date, set both values to that day.\r\n            \r\n<b>Spend.</b> If the endAfterDate is supplied, the spend excludes spend that\r\nhappened after that date. In the case of a daily budget, only the spend for\r\nthe final day is displayed.\r\n            \r\nSee the budgets endpoint for additional details."
      operationId: GetSellerBudgets
