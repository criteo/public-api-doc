      - name: advertiserId
        in: query
        description: Return only budgets belonging to the specified advertiser
        style: form
        schema:
          type: integer
          format: int32
      - name: campaignId
        in: query
        description: Return only budgets that pay for a given campaign.
        style: form
        schema:
          type: integer
          format: int32
      - name: endAfterDate
