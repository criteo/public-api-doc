  /2025-07/marketing-solutions/marketplace-performance-outcomes/sellers/{sellerId}/budgets:
    get:
      tags:
      - Campaign
      summary: Get Budgets By Seller
      description: "Return a collection of budgets for this seller filtered by optional filter parameters.\r\nIf all parameters are omitted the entire collection to which the user has\r\naccess is returned, except those whose endDate is in the past. Returned budgets must satisfy all supplied filter\r\ncriteria if multiple parameters are used. See the budgets endpoint for additional details."
      operationId: GetBudgetsBySeller
      parameters:
      - name: campaignId
        in: query
        description: Return only budgets that pay for a given campaign.
        style: form
        schema:
          type: integer
          format: int32
      - name: endAfterDate
        in: query
        description: "Return budgets that end after the given date using the `yyyy-MM-DD` format.\r\n            If param is not provided, default behavior is to only return budgets that have not yet ended."
        style: form
        schema:
          type: string
          format: date-time
      - name: sellerId
        in: path
        description: Return only budgets belonging to the given seller.
        required: true
        style: simple
        schema:
          type: string
      - name: startBeforeDate
        in: query
        description: Return budgets that start on or before the given date using the `yyyy-MM-DD` format.
        style: form
        schema:
          type: string
          format: date-time
      - name: status
        in: query
        description: Return only budgets with the given status.
        style: form
        schema:
          enum:
          - Archived
          - Current
          - Scheduled
          type: string
      - name: type
        in: query
        description: Return only budgets with the given budget type.
        style: form
        schema:
          type: string
      - name: withBalance
        in: query
        description: Return only budgets with the given status.
        style: form
        schema:
          type: boolean
      - name: withSpend
