        schema:
          type: string
          format: date-time
      - name: sellerId
        in: query
        description: Return only budgets belonging to the given seller.
        style: form
        schema:
          type: string
      - name: startBeforeDate
        in: query
        description: Return budgets that start on or before the given date using the `yyyy-MM-DD` format.
