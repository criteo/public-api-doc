          description: Campaigns returned OK.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    campaignType:
                      type: string
                      enum:
                      - MidFunnel
                      - LowerFunnel
                      - AudienceSelling
