openapi: 3.0.1
info:
  title: Marketing API v.1.0
  description: 'IMPORTANT: This swagger links to Criteo production environment. Any test applied here will thus impact real campaigns.'
  version: v.1.0
servers:
- url: https://api.criteo.com
security:
- OAuth2Credentials: []
paths:
  /oauth2/token:
    post:
      tags:
      - Authorization
      security: []
      description: Creates a token when the supplied client credentials are valid
      operationId: ApiV1Oauth2TokenPost
      requestBody:
        description: The clientId and clientSecret used to authenticate
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                client_secret:
                  type: string
                grant_type:
                  enum:
                  - client_credentials
                  default: client_credentials
              description: Client Credentials for fun
              x-readme-ref-name: ClientCredentials
      responses:
        '201':
          description: Success
          content:
            text/plain:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                description: JSON Web Token to be used with other services
                x-readme-ref-name: JwtModel
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                description: JSON Web Token to be used with other services
                x-readme-ref-name: JwtModel
            text/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                description: JSON Web Token to be used with other services
                x-readme-ref-name: JwtModel
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                    readOnly: true
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    format: int32
                  detail:
                    type: string
                  instance:
                    type: string
                additionalProperties:
                  type: object
                description: "Holds machine-readable details of errors in a HTTP response to avoid the need to\r\ndefine new error response formats for HTTP APIs."
                x-readme-ref-name: ProblemDetail
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                    readOnly: true
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    format: int32
                  detail:
                    type: string
                  instance:
                    type: string
                additionalProperties:
                  type: object
                description: "Holds machine-readable details of errors in a HTTP response to avoid the need to\r\ndefine new error response formats for HTTP APIs."
                x-readme-ref-name: ProblemDetail
            text/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                    readOnly: true
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    format: int32
                  detail:
                    type: string
                  instance:
                    type: string
                additionalProperties:
                  type: object
                description: "Holds machine-readable details of errors in a HTTP response to avoid the need to\r\ndefine new error response formats for HTTP APIs."
                x-readme-ref-name: ProblemDetail
      summary: V 1 OAuth 2 Token Post
