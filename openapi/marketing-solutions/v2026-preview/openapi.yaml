                                  type: string
                                  description: Web redirection of the landing page url
                                  format: uri
                                  nullable: true
                                layouts:
                                  type: array
                                  items:
                                    enum:
                                    - Editorial
                                    - Montage
                                    - InBannerVideo
                                    type: string
                                  description: "The Adaptive layouts that are enabled.\r\nIt can contain any of the following values: \"Editorial\", “Montage“, \"InBannerVideo\"."
                                  nullable: true
                                logos:
                                  type: array
                                  items:
                                    required:
                                    - shape
                                    - url
                                    type: object
                                    properties:
                                      shape:
                                        enum:
