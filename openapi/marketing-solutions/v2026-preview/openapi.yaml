        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: The found ad is returned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      attributes:
                        type: object
                        properties:
                          adSetId:
                            type: string
                            description: The id of the Ad Set binded to this Ad
                            nullable: true
                          creativeId:
                            type: string
