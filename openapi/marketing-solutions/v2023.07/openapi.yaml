      summary: Patch Ad Sets
    post:
      tags:
      - Campaign
      description: Create the specified ad set
      operationId: CreateAdSet
      requestBody:
        description: the ad sets to create
        content:
          application/json-patch+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    attributes:
                      required:
                      - bidding
                      - budget
                      - campaignId
                      - datasetId
                      - mediaType
                      - name
                      - objective
                      - schedule
                      - targeting
                      - trackingCode
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the ad set
                        datasetId:
                          type: string
                          description: Dataset id of this ad set
                        campaignId:
                          type: string
                          description: Campaign id this ad set belongs to
                        objective:
                          enum:
                          - customAction
                          - clicks
                          - conversions
                          - displays
                          - appPromotion
                          - revenue
                          - storeConversions
                          - value
                          - reach
                          - visits
                          - videoViews
                          type: string
                          description: Objective of the ad set
                        schedule:
                          required:
                          - startDate
                          type: object
                          properties:
                            startDate:
                              type: string
                              format: date-time
                            endDate:
                              type: string
                              format: date-time
                          description: ad set schedule create model
                          x-readme-ref-name: CreateAdSetSchedule
                        bidding:
                          required:
                          - costController
                          type: object
                          properties:
                            bidAmount:
                              type: number
                              description: Decimal value target relating to the `bidStrategy` specified. May be `null` for strategies that do not require a target value. At most 4 decimals are supported. Additional decimals are rounded.
                              format: double
                            costController:
                              enum:
                              - COS
                              - CPC
                              - CPI
                              - CPM
                              - CPO
                              - CPSV
                              - CPV
                              - dailyBudget
                              type: string
                              description: How spend is controlled
                          description: ad set bidding create model
                          x-readme-ref-name: CreateAdSetBidding
