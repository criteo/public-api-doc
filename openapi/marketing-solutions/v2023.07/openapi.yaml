                        required:
                        - advertiserIds
                        - dimensions
                        - metrics
                        - currency
                        - format
                        - startDate
                        - endDate
                        type: object
                        properties:
                          advertiserIds:
                            type: string
                            description: The comma-separated list of advertiser ids.
                          campaignIds:
                            type: string
                            description: The comma-separated list of campaign ids.
                          adsetIds:
                            type: string
                            description: The comma-separated list of adSet ids.
                          environment:
