  /2024-01/placements/report:
    post:
      tags:
      - Analytics
      description: Your ads are placed in different domains (publishers) and environments (websites and apps). Thanks to the placements endpoint, you can analyse the performances for each publisher, comparing displays, clicks and sales generated.
      operationId: GetPlacementsReport
      requestBody:
        content:
          application/json-patch+json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: Type of the resource.
                        nullable: true
                      attributes:
                        required:
                        - advertiserIds
                        - currency
                        - dimensions
                        - endDate
                        - format
                        - metrics
                        - startDate
                        type: object
                        properties:
                          advertiserIds:
                            type: string
                            description: The comma-separated list of advertiser ids.
                          campaignIds:
                            type: string
                            description: The comma-separated list of campaign ids.
                            nullable: true
                          adsetIds:
                            type: string
                            description: The comma-separated list of adSet ids.
                            nullable: true
                          environment:
                            type: string
                            description: 'Type of environment: Web, Android or iOS.'
                            nullable: true
                          placement:
                            type: string
                            description: Filter the value of the placement
                            nullable: true
                          dimensions:
                            type: array
                            items:
                              enum:
                              - AdsetId
                              - AdvertiserId
                              - Placement
                              - Environment
                              - AdsetName
                              - AdvertiserName
                              - CampaignId
                              - CampaignName
                              - AdChannel
                              - SocialPlatform
                              - CategoryId
                              - CategoryName
                              type: string
                            description: The dimensions for the report.
                          metrics:
                            type: array
                            items:
                              type: string
                            description: The list of metrics to report.
