                            properties:
                              visitorsType:
                                enum:
                                - All
                                - Buyers
                                - NonBuyers
                                type: string
                                description: Types of visitors.
                              daysSinceLastVisitMin:
                                type: integer
                                description: Minimum number of days since last visit to partner.
                                format: int32
                              daysSinceLastVisitMax:
                                type: integer
                                description: Maximum number of days since last visit to partner.
