                                - Last45Days
                                - Last60Days
                                - Last90Days
                                - Last120Days
                                - Last150Days
                                - Last180Days
                                type: string
                                description: Number of days of the lookback windows
                              maxPrice:
                                type: object
                                properties:
                                  value:
                                    type: number
                                    description: The value. If missing or null the value is set to "null"
